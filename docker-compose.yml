services:
  db:
    image: postgres:16-alpine
    container_name: 92cine_db
    restart: always
    environment:
      POSTGRES_DB: 92cine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
